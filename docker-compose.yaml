services:
  app:
    build: .
    image: royal-beef
    container_name: royal-beef
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # DB + cover art live on the mounted volume so they survive rebuilds.
      DATABASE_URL: /app/data/royalbeef.db
      COVERS_DIR: /app/data/covers
      # Controller images: uploaded in-app (Controllers page) or dropped into the
      # bind-mounted folder below. Either way they land in ./data/controllers on the
      # host and are re-scanned into the inventory on boot.
      CONTROLLERS_DIR: /app/data/controllers
      HOST: 0.0.0.0
      PORT: "3000"
      # Read from .env so the same compose file works on every machine. adapter-node needs
      # it to know its own origin — without a matching value SvelteKit's CSRF check rejects
      # every form submission with a 403. Set ORIGIN in .env to the URL you actually open the
      # app at (e.g. http://192.168.1.x:3000 on your NAS); defaults to localhost for local runs.
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      BODY_SIZE_LIMIT: 10M
    volumes:
      - royalbeef-data:/app/data
      # Controller images live here on the host so in-app uploads persist and you can
      # also drop files in directly (TrueNAS: point this at a dataset). Read-write so
      # the Controllers page can save uploads; the seed re-scans it on every boot.
      - ./data/controllers:/app/data/controllers

volumes:
  royalbeef-data:
