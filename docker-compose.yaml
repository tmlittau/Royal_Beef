services:
  app:
    build: .
    image: royal-beef
    container_name: royal-beef
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # DB + cover art live on the mounted volume so they survive rebuilds.
      DATABASE_URL: /app/data/royalbeef.db
      COVERS_DIR: /app/data/covers
      # Controller images (your own static assets) are bind-mounted in below and
      # scanned into the inventory on boot.
      CONTROLLERS_DIR: /app/data/controllers
      HOST: 0.0.0.0
      PORT: "3000"
      # Required by adapter-node so SvelteKit knows its own origin — without this,
      # its CSRF protection rejects all form submissions with a 403. Change this to
      # the URL you actually open the app at (e.g. http://192.168.1.x:3000 on a LAN).
      ORIGIN: http://localhost:3000
      BODY_SIZE_LIMIT: 10M
    volumes:
      - royalbeef-data:/app/data
      # Your controller images, mounted read-only so the seed can scan them into
      # the inventory. Add/remove images here, then restart to re-sync.
      - ./data/controllers:/app/data/controllers:ro

volumes:
  royalbeef-data:
